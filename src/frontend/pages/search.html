<div class="page-search">
  <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 32px;">
    <input type="text" id="search-input" placeholder="Search for anime..." 
           style="flex: 1; padding: 12px 20px; border-radius: var(--border-radius); background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem;">
  </div>

  <div style="display: flex; gap: 24px;">
    <!-- Sidebar Filters -->
    <aside style="width: 260px; display: flex; flex-direction: column; gap: 28px;">
      <div class="filter-group">
        <label style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 8px;">Type</label>
        <select id="filter-type" style="width: 100%; background: var(--card-bg); color: white; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
          <option value="all">All Types</option>
          <option value="TV">TV</option>
          <option value="Movie">Movie</option>
          <option value="OVA">OVA</option>
          <option value="Special">Special</option>
        </select>
      </div>
      <div class="filter-group">
        <label style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 8px;">Min Score</label>
        <input type="range" id="filter-score" min="0" max="10" step="1" value="0" style="width: 100%;">
        <div id="score-val" style="font-size: 0.8rem; text-align: center; margin-top: 4px;">0+</div>
      </div>
    </aside>

    <!-- Results Area -->
    <div style="flex: 1;">
      <div id="search-results-info" style="margin-bottom: 16px; color: var(--text-muted);"></div>
      <div class="anime-grid" id="search-grid">
        <div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">
          Type something to search...
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { apiFetch } from '/assets/app.js';

  const input = document.getElementById('search-input');
  const grid = document.getElementById('search-grid');
  const info = document.getElementById('search-results-info');
  const filterType = document.getElementById('filter-type');
  const filterScore = document.getElementById('filter-score');
  const scoreVal = document.getElementById('score-val');
  
  let debounceTimeout;
  let lastResults = [];

  const updateView = () => {
    const type = filterType.value;
    const minScore = parseFloat(filterScore.value);
    scoreVal.textContent = `${minScore}+`;
    
    const filtered = lastResults.filter(a => {
      const typeMatch = type === 'all' || a.type === type;
      const scoreMatch = (a.score || 0) >= minScore;
      return typeMatch && scoreMatch;
    });
    
    renderResults(filtered, input.value.trim());
  };

  input.addEventListener('input', (e) => {
    const q = e.target.value.trim();
    clearTimeout(debounceTimeout);
    
    // Smart Search: Check for MAL URL
    const malMatch = q.match(/myanimelist\.net\/anime\/(\d+)/);
    if (malMatch) {
      window.location.href = `/anime/${malMatch[1]}`;
      return;
    }

    if (!q) {
      lastResults = [];
      grid.innerHTML = '<div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">Type something to search...</div>';
      info.textContent = '';
      return;
    }

    debounceTimeout = setTimeout(() => performSearch(q), 300);
  });

  filterType.onchange = updateView;
  filterScore.oninput = updateView;

  async function performSearch(q) {
    grid.innerHTML = Array(12).fill('<div class="skeleton" style="height: 240px; border-radius: var(--border-radius);"></div>').join('');
    info.innerHTML = `<span class="spinner" style="display: inline-block; width: 12px; height: 12px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;"></span> Searching for "${q}"...`;

    try {
      lastResults = await apiFetch(`/api/search?q=${encodeURIComponent(q)}`);
      updateView();
    } catch (err) {
      grid.innerHTML = '';
      info.textContent = 'Error fetching results.';
    }
  }

  function renderResults(list, q) {
    if (list.length === 0) {
      grid.innerHTML = `<div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 40px;">No matching results for "${q}"</div>`;
      info.textContent = '';
      return;
    }

    info.textContent = `Showing ${list.length} results for "${q}"`;
    grid.innerHTML = list.map(item => `
      <a href="/anime/${item.malId}" class="anime-card" data-link>
        <img src="${item.poster}" alt="${item.title}" onerror="this.src='/assets/no-poster.svg'">
        <div class="anime-card-content">
          <div class="anime-card-title">${item.titleEn || item.title}</div>
          <div class="anime-card-meta">${item.year || ''} • ${item.type || 'TV'}</div>
        </div>
      </a>
    `).join('');
  }

  // Handle URL params if navigating from elsewhere
  window.addEventListener('page-load', (e) => {
    if (e.detail.path === '/search') {
      const q = e.detail.params.get('q');
      if (q) {
        input.value = q;
        performSearch(q);
      }
    }
  }, { once: true });
</script>
